<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="800" height="200" rx="15" fill="url(#grad1)" />
  
  <!-- Network Pattern Background -->
  <g stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.3">
    <circle cx="50" cy="50" r="3" fill="#ffffff" />
    <circle cx="150" cy="150" r="3" fill="#ffffff" />
    <circle cx="250" cy="50" r="3" fill="#ffffff" />
    <circle cx="350" cy="150" r="3" fill="#ffffff" />
    <line x1="50" y1="50" x2="150" y2="150" />
    <line x1="150" y1="150" x2="250" y2="50" />
    <line x1="250" y1="50" x2="350" y2="150" />
  </g>

  <!-- Title Text -->
  <text x="400" y="100" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#shadow)">
    AWESOME AUTOENCODERS
  </text>
  <text x="400" y="140" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" fill-opacity="0.9">
    A Curated Collection of Neural Network Architectures
  </text>
  
  <!-- Autoencoder schematic -->
  <g transform="translate(600, 40)" stroke="#ffffff" fill="none">
    <rect x="0" y="0" width="30" height="120" rx="5" stroke-width="2" />
    <rect x="50" y="30" width="20" height="60" rx="5" stroke-width="2" />
    <rect x="100" y="0" width="30" height="120" rx="5" stroke-width="2" />
    <path d="M30 20 L50 40" stroke-width="1" />
    <path d="M30 60 L50 60" stroke-width="1" />
    <path d="M30 100 L50 80" stroke-width="1" />
    <path d="M70 40 L100 20" stroke-width="1" />
    <path d="M70 60 L100 60" stroke-width="1" />
    <path d="M70 80 L100 100" stroke-width="1" />
  </g>
</svg>
